name: CI
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
      - name: Build
        run: lake build
      - name: Check minimal imports
        run: lake shake
      - name: Tests
        run: lake test
      - name: Self-check README
        run: lake exe lean-readme
